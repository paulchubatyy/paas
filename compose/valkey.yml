networks:
  db-net:
    external: true

services:
  valkey:
    image: valkey/valkey:8-alpine
    container_name: shared-valkey
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    command: valkey-server --appendonly yes
    networks:
      - db-net
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  valkey_data:
