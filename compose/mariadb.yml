networks:
  db-net:
    external: true

services:
  mariadb:
    image: mariadb:${MARIADB_VERSION:-11}
    container_name: shared-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mariadb_data:/var/lib/mysql
    # Uncomment to expose for local development (localhost only):
    # ports:
    #   - "127.0.0.1:3306:3306"
    # To expose on all interfaces (WARNING: bypasses host firewall, see README):
    #   - "3306:3306"
    networks:
      - db-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-backup:
    build: ../backup
    image: paas-backup:latest
    container_name: db-backup
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - db-net
    environment:
      DB_TYPE: mariadb
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      BACKUP_ALL: ${BACKUP_ALL:-false}
      EXTRA_OPTS: ${EXTRA_OPTS}
      SCHEDULE: ${SCHEDULE:-@daily}
      S3_PREFIX: ${S3_PREFIX:-backup}
      ENCRYPTION_PASSWORD: ${ENCRYPTION_PASSWORD}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ENDPOINT: ${S3_ENDPOINT}

  db-restore:
    build: ../backup
    image: paas-backup:latest
    container_name: db-restore
    restart: "no"
    profiles:
      - restore
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - db-net
    environment:
      DB_TYPE: mariadb
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      BACKUP_ALL: ${BACKUP_ALL:-false}
      DROP_PUBLIC: ${DROP_PUBLIC:-yes}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PREFIX: ${S3_PREFIX:-backup}
      ENCRYPTION_PASSWORD: ${ENCRYPTION_PASSWORD}
    entrypoint: ["/bin/sh", "/restore.sh"]

volumes:
  mariadb_data:
