networks:
  db-net:
    external: true

services:
  postgres:
    image: postgres:18
    container_name: shared-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-backup:
    build: ../backup
    image: paas-backup:latest
    container_name: db-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - db-net
    env_file:
      - ../.env
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      BACKUP_ALL: ${BACKUP_ALL:-false}
      EXTRA_OPTS: ${EXTRA_OPTS}
      SCHEDULE: ${SCHEDULE:-@daily}
      S3_PREFIX: ${S3_PREFIX:-backup}
      ENCRYPTION_PASSWORD: ${ENCRYPTION_PASSWORD}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ENDPOINT: ${S3_ENDPOINT}

  db-restore:
    build: ../backup
    image: paas-backup:latest
    container_name: db-restore
    restart: "no"
    profiles:
      - restore
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - db-net
    env_file:
      - ../.env
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      BACKUP_ALL: ${BACKUP_ALL:-false}
      DROP_PUBLIC: ${DROP_PUBLIC:-yes}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PREFIX: ${S3_PREFIX:-backup}
      ENCRYPTION_PASSWORD: ${ENCRYPTION_PASSWORD}
    entrypoint: ["/bin/sh", "/restore.sh"]

volumes:
  postgres_data:
