repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: mixed-line-ending
      - id: check-vcs-permalinks

  - repo: local
    hooks:
      - id: no-env-files
        name: Prevent committing .env files
        entry: found .env file! These contain secrets and should not be committed.
        language: fail
        files: '^\.env$'

      - id: check-docker-compose-valid
        name: Validate compose files
        entry: docker compose config -q
        language: system
        files: compose/.*\.yml$
        pass_filenames: false

      - id: check-makefile-tabs
        name: Check Makefile uses tabs
        entry: bash -c 'if grep -q "^  " Makefile; then echo "Makefile must use tabs, not spaces"; exit 1; fi'
        language: system
        files: Makefile$
        pass_filenames: false

      - id: check-hardcoded-passwords
        name: Check for hardcoded passwords in compose files
        entry: bash -c 'for f in compose/*.yml; do if grep -i -E "(password|secret|key|token)\s*[=:]\s*["'"'"'][^"'"'"']+["'"'"']" "$f"; then echo "Potential hardcoded password in $f!"; exit 1; fi; done'
        language: system
        files: compose/.*\.yml$
        pass_filenames: false

      - id: check-s3-credentials
        name: Check for hardcoded S3 credentials in compose files
        entry: bash -c 'for f in compose/*.yml; do if grep -E "(S3_ACCESS_KEY_ID|S3_SECRET_ACCESS_KEY|S3_BUCKET|S3_ENDPOINT)\s*[=:]\s*["'"'"'][^$][^"'"'"']*["'"'"']" "$f"; then echo "Hardcoded S3 credentials in $f! Use \${S3_*} variables."; exit 1; fi; done'
        language: system
        files: compose/.*\.yml$
        pass_filenames: false
